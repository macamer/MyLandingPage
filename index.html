<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cantarell:ital,wght@0,400;0,700;1,400;1,700&family=Didact+Gothic&display=swap"
          rel="stylesheet">
    <link rel="shortcut icon" href="img/logo.svg" type="image/x-icon">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/index.css">
    <title>FaceFood</title>
</head>
<body>
<header>
    <div class="logo">
        <img src="img/logo.svg" alt="logo">
        <h1>facefood</h1>
    </div>
    <div class="buscador">
        <img src="img/search-icon.svg" alt="buscador-icono">
        <input type="search" name="buscador" id="buscador" placeholder="Empieza tu búsqueda">
    </div>
</header>
<main>
    <section class="main">
        <h3>LA RED SOCIAL PARA LOS AMANTES DE LA COMIDA</h3>
        <h5>Y a ti, ¿Te gusta cocinar?</h5>
        <div>
            <button id="login">INICIAR SESIÓN</button>
            <button id="register">REGISTRARSE</button>
        </div>
    </section>
</main>
</body>
</html>
